<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Akhon Somoy Sokal: {{dt}} </h1>
    <h1>Akhon Somoy Sokal: <span id="clock">{{ dt }}</span></h1>

<script>
    function updateClock() {
        const now = new Date();
        const options = { 
            year: 'numeric', month: 'long', day: 'numeric', 
            hour: '2-digit', minute: '2-digit', second: '2-digit',
            hour12: true 
        };
        document.getElementById('clock').innerHTML = now.toLocaleString('en-US', options);
    }

    // পেজ লোড হওয়ার সাথে সাথেই একবার কল করুন
    updateClock(); 

    // এরপর প্রতি ১ সেকেন্ড পর পর চলতে থাকবে
    setInterval(updateClock, 1000);
</script>
</body>
</html>
