<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment</title>
  </head>
  <body>
    <h1>Payment List</h1>

    <table border="1">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Amount</th>
            <th>Remarks</th>
        </tr>
        {% for i in pay %}
        <tr>
            <td>{{ i.id}}</td>
            <td>{{ i.name}}</td>
            <td>{{ i.Amount}}</td>
            <td>Paid</td>
        {% endfor %}
        </tr>
    </table>
  </body>
</html>
