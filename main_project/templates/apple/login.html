{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <form method="POST" novalidate>
    {% csrf_token %}
    {% if form.non_field_errors %}
    {% for error in form.non_field_errors %}
    <p>{{ error }}</p>
    {% endfor %}
    {% endif %}
    {% for i in form %}
    {{ i.label_tag}} {{i}} {{ i.errors|striptags}} <br> <br>
    {% endfor %}
    <button type="submit">Login</button>
    <a href ="{% url "building" %}"> Registration</a>
    </form>
</body>
</html>
